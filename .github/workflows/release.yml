name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Create tag from package.json version
        id: create-tag
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if git ls-remote --exit-code origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "tag_name=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build and package
        if: startsWith(github.ref, 'refs/tags/') || steps.create-tag.outputs.tag_name != ''
        run: bun run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Verify build artifacts
        if: always() && (startsWith(github.ref, 'refs/tags/') || steps.create-tag.outputs.tag_name != '')
        run: 'ls -la dist/*.dmg dist/*.zip 2>/dev/null || echo "WARNING: No DMG/ZIP files found in dist/"'

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/') || steps.create-tag.outputs.tag_name != ''
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/*.dmg,dist/*.zip
          tag_name: ${{ steps.create-tag.outputs.tag_name || github.ref_name }}
          fail_on_unmatched_files: true
          make_latest: true
