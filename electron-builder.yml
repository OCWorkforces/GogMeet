appId: com.ccworkforce.googlemeet
productName: Google Meet
copyright: Copyright © 2026 CCWorkforce

directories:
  output: dist
  buildResources: build

files:
  - lib/**/*
  - src/assets/**/*
  - src/main/gimeet-events.swift
  - package.json
  - '!**/*.map'
  - '!**/node_modules'

mac:
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    LSUIElement: true
    NSCalendarsFullAccessUsageDescription: Google Meet needs calendar access to find your Google Meet events.
    NSAppleEventsUsageDescription: Google Meet uses AppleScript to read your calendar events.
  notarize: false

afterSign: build/notarize.js

nsis:
  oneClick: false
  perMachine: true
