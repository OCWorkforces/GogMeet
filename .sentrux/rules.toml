# ════════════════════════════════════════════════════════════════
# GLOBAL CONSTRAINTS
# ════════════════════════════════════════════════════════════════

[constraints]
max_cycles = 0            # Zero circular dependencies allowed
max_cc = 25               # Max cyclomatic complexity per function
no_god_files = true       # No file >500 lines or fan-out >15

# Quality gate — minimum overall quality signal (0-10000 scale)
# Current: 5860, target: 7000+. Conservative first step.
[constraints.quality_gate]
description = "Minimum quality signal threshold"
minimum_quality_signal = 6000

# Maximum dependency chain depth (current: 14, target: ~10 post-refactor)
[constraints.max_dependency_depth]
description = "Maximum dependency chain depth"
max_depth = 12

# Maximum lines per source file (state.ts was 433, close to limit)
[constraints.max_file_lines]
description = "Maximum lines per source file"
max_lines = 500

# ════════════════════════════════════════════════════════════════
# LAYER DEFINITIONS (ordered by dependency level)
# ════════════════════════════════════════════════════════════════

[[layers]]
name = "shared"
order = 2
paths = ["src/shared/**"]

[[layers]]
name = "main"
order = 1
paths = ["src/main/**", "src/preload/**"]

[[layers]]
name = "renderer"
order = 0
paths = ["src/renderer/**"]

# ════════════════════════════════════════════════════════════════
# BOUNDARY RULES (forbidden cross-process imports)
# ════════════════════════════════════════════════════════════════

# GogMeet Architectural Constraints
# Enforces Electron 3-process separation and module boundaries.
#
# Structure:
#   1. Cross-process boundaries (renderer ↔ main, preload bridge)
#   2. Shared self-containment (shared must not depend on processes)
#   3. Source ↔ test isolation
#   4. Utils isolation (pure helpers — no business logic deps)
#   5. IPC handler boundaries (thin wrappers, no window creation)
#   6. Cycle prevention — scheduler (scheduler ↔ tray ↔ ipc-handlers)
#   7. Cycle prevention — shortcuts (leaf module isolation)
#   8. Renderer entry independence (separate HTML entry points)

# ────────────────────────────────────────────────────────────────
# 1. CROSS-PROCESS BOUNDARIES
# ────────────────────────────────────────────────────────────────

# Renderer must NEVER import from main process
# (communication goes through IPC via preload bridge)
[[rules]]
name = "no-renderer-to-main-import"
from = "src/renderer"
to = "src/main"
type = "forbidden"

# Main must NEVER import from renderer
# (main communicates via win.webContents.send)
[[rules]]
name = "no-main-to-renderer-import"
from = "src/main"
to = "src/renderer"
type = "forbidden"

# Preload must ONLY import from shared (types/channels)
# (preload is the bridge — it should not import main process logic)
[[rules]]
name = "no-preload-to-main-import"
from = "src/preload"
to = "src/main"
type = "forbidden"

# Preload must not import renderer code
# (preload exposes API; renderer consumes it, never the reverse)
[[rules]]
name = "no-preload-to-renderer-import"
from = "src/preload"
to = "src/renderer"
type = "forbidden"

# Renderer must not import from preload directly
# (communication goes through context bridge API)
[[rules]]
name = "no-renderer-to-preload-import"
from = "src/renderer"
to = "src/preload"
type = "forbidden"

# ────────────────────────────────────────────────────────────────
# 2. SHARED SELF-CONTAINMENT
# ────────────────────────────────────────────────────────────────

# Shared must be self-contained — no reverse dependencies
# (shared defines types used by all processes; it must not depend on them)
[[rules]]
name = "shared-no-main-import"
from = "src/shared"
to = "src/main"
type = "forbidden"

[[rules]]
name = "shared-no-renderer-import"
from = "src/shared"
to = "src/renderer"
type = "forbidden"

[[rules]]
name = "shared-no-preload-import"
from = "src/shared"
to = "src/preload"
type = "forbidden"

# ────────────────────────────────────────────────────────────────
# 3. SOURCE ↔ TEST ISOLATION
# ────────────────────────────────────────────────────────────────

# Tests must not be imported by source code
[[rules]]
name = "no-source-to-test-import"
from = "src"
to = "tests"
type = "forbidden"

# ────────────────────────────────────────────────────────────────
# 4. UTILS ISOLATION
# (utils are pure helpers — no business logic, no side effects)
# ────────────────────────────────────────────────────────────────

# Utils must stay isolated — no business logic dependencies
[[rules]]
name = "utils-no-scheduler-import"
from = "src/main/utils"
to = "src/main/scheduler"
type = "forbidden"

[[rules]]
name = "utils-no-tray-import"
from = "src/main/utils"
to = "src/main/tray"
type = "forbidden"

[[rules]]
name = "utils-no-settings-import"
from = "src/main/utils"
to = "src/main/settings"
type = "forbidden"

# Utils must not import calendar (Swift EventKit business logic)
[[rules]]
name = "utils-no-calendar-import"
from = "src/main/utils"
to = "src/main/calendar"
type = "forbidden"

# Utils must not import IPC handlers (utils are lower-level)
[[rules]]
name = "utils-no-ipc-handlers-import"
from = "src/main/utils"
to = "src/main/ipc-handlers"
type = "forbidden"

# ────────────────────────────────────────────────────────────────
# 5. IPC HANDLER BOUNDARIES
# (IPC handlers are thin wrappers; window creation is managed elsewhere)
# ────────────────────────────────────────────────────────────────

# Calendar IPC handler must not depend on scheduler
# (calendar handler serves data; scheduler consumes it — no reverse)
[[rules]]
name = "ipc-calendar-no-scheduler"
from = "src/main/ipc-handlers/calendar"
to = "src/main/scheduler"
type = "forbidden"

# App IPC handler must not import scheduler
# (app handler handles open-external and get-version; no scheduling concern)
[[rules]]
name = "ipc-app-no-scheduler"
from = "src/main/ipc-handlers/app"
to = "src/main/scheduler"
type = "forbidden"

# Window IPC handler must not import scheduler
# (window handler manages popover height; no scheduling concern)
[[rules]]
name = "ipc-window-no-scheduler"
from = "src/main/ipc-handlers/window"
to = "src/main/scheduler"
type = "forbidden"

# IPC handlers must not import alert-window
# (alert lifecycle is managed by scheduler, not IPC layer)
[[rules]]
name = "ipc-handlers-no-alert-window"
from = "src/main/ipc-handlers"
to = "src/main/alert-window"
type = "forbidden"

# IPC handlers must not import settings-window
# (settings window lifecycle is managed by tray, not IPC layer)
[[rules]]
name = "ipc-handlers-no-settings-window"
from = "src/main/ipc-handlers"
to = "src/main/settings-window"
type = "forbidden"

# ────────────────────────────────────────────────────────────────
# 6. CYCLE PREVENTION — SCHEDULER
# (scheduler → tray would create cycles; ipc-handlers → scheduler
#  is allowed only for settings handler's restartScheduler)
# ────────────────────────────────────────────────────────────────

# Scheduler must NEVER import tray (prevents scheduler ↔ tray cycle)
# (scheduler depends on calendar, settings, alert-window;
#  tray depends on calendar, settings, settings-window)
[[rules]]
name = "scheduler-no-tray"
from = "src/main/scheduler"
to = "src/main/tray"
type = "forbidden"

# Tray must NEVER import scheduler (prevents tray ↔ scheduler cycle)
[[rules]]
name = "tray-no-scheduler"
from = "src/main/tray"
to = "src/main/scheduler"
type = "forbidden"

# Scheduler must NEVER import IPC handlers (prevents cycle)
# (ipc-handlers/settings imports scheduler for restartScheduler;
#  reverse must be forbidden)
[[rules]]
name = "scheduler-no-ipc-handlers"
from = "src/main/scheduler"
to = "src/main/ipc-handlers"
type = "forbidden"

# IPC handlers must use scheduler facade, not direct index import
# (prevents re-introduction of circular dependency through re-exports;
#  ipc-handlers/settings.ts must import from scheduler/facade.js)
[[rules]]
name = "ipc-handlers-use-scheduler-facade"
from = "src/main/ipc-handlers"
to = "src/main/scheduler/index"
type = "forbidden"

# scheduler/index must not re-export from poll (prevents circular dep regression)
# (poll.ts imports scheduleEvents from index.ts — reverse re-export creates cycle;
#  use scheduler/facade.ts as the public API surface instead)
[[rules]]
name = "scheduler-index-no-poll-reexport"
from = "src/main/scheduler/index"
to = "src/main/scheduler/poll"
type = "forbidden"

# ────────────────────────────────────────────────────────────────
# 7. CYCLE PREVENTION — SHORTCUTS
# (shortcuts is a leaf module: registers Cmd+Shift+M, joins next meeting)
# ────────────────────────────────────────────────────────────────

# Shortcuts must not import scheduler (shortcuts is a leaf action)
[[rules]]
name = "shortcuts-no-scheduler"
from = "src/main/shortcuts"
to = "src/main/scheduler"
type = "forbidden"

# Shortcuts must not import tray (shortcuts is a leaf action)
[[rules]]
name = "shortcuts-no-tray"
from = "src/main/shortcuts"
to = "src/main/tray"
type = "forbidden"

# ────────────────────────────────────────────────────────────────
# 8. RENDERER ENTRY INDEPENDENCE
# (3 separate HTML entries: popover, settings, alert — fully independent)
# ────────────────────────────────────────────────────────────────

# Settings renderer must not import alert renderer
# (separate BrowserWindow entries with no shared runtime)
[[rules]]
name = "renderer-settings-no-alert"
from = "src/renderer/settings"
to = "src/renderer/alert"
type = "forbidden"

# Alert renderer must not import settings renderer
[[rules]]
name = "renderer-alert-no-settings"
from = "src/renderer/alert"
to = "src/renderer/settings"
type = "forbidden"

# ════════════════════════════════════════════════════════════════
# 9. TEST COVERAGE REQUIREMENTS
# (critical modules must have corresponding test files)
# ════════════════════════════════════════════════════════════════

# Scheduler modules must have tests
[[rules]]
description = "Scheduler modules must have tests"
layer = "test"
pattern = "src/main/scheduler/*.ts"
requires_test = true

# IPC handlers must have tests
[[rules]]
description = "IPC handlers must have tests"
layer = "test"
pattern = "src/main/ipc-handlers/*.ts"
requires_test = true

# Swift bridge must have tests
[[rules]]
description = "Swift bridge must have tests"
layer = "test"
pattern = "src/main/swift/*.ts"
requires_test = true
