# ════════════════════════════════════════════════════════════════
# GLOBAL CONSTRAINTS
# ════════════════════════════════════════════════════════════════

[constraints]
max_cycles = 0            # Zero circular dependencies allowed
max_cc = 25               # Max cyclomatic complexity per function
no_god_files = true       # No file >500 lines or fan-out >15

# Quality gate — minimum overall quality signal (0-10000 scale)
# Current: 5925. Set below current to catch regressions.
[constraints.quality_gate]
description = "Minimum quality signal threshold"
minimum_quality_signal = 5800

# Maximum dependency chain depth (current: 14, allowing +1 buffer)
[constraints.max_dependency_depth]
description = "Maximum dependency chain depth"
max_depth = 15

# Maximum lines per source file (state.ts was 433, close to limit)
[constraints.max_file_lines]
description = "Maximum lines per source file"
max_lines = 500

# ════════════════════════════════════════════════════════════════
# LAYER DEFINITIONS (ordered by dependency level)
# ════════════════════════════════════════════════════════════════

[[layers]]
name = "shared"
order = 2
paths = ["src/shared/**"]

[[layers]]
name = "main"
order = 1
paths = ["src/main/**", "src/preload/**"]

[[layers]]
name = "renderer"
order = 0
paths = ["src/renderer/**"]

# ════════════════════════════════════════════════════════════════
# BOUNDARY RULES
# ════════════════════════════════════════════════════════════════
#
# GogMeet Architectural Constraints
# Enforces Electron 3-process separation and module boundaries.
#
# Structure:
#   1. Cross-process boundaries (renderer ↔ main, preload bridge)
#   2. Shared self-containment (shared must not depend on processes)
#   3. Source ↔ test isolation
#   4. Utils isolation (pure helpers — no business logic deps)
#   5. IPC handler boundaries (thin wrappers, no window creation)
#   6. Scheduler boundaries (facade pattern, no tray import)
#   7. Shortcuts isolation (leaf action module)
#   8. Renderer entry independence (separate HTML entry points)
#   9. Swift bridge isolation (only shared types + internal)
#  10. Leaf module isolation (auto-launch, auto-updater, notification, power)
#  11. Calendar isolation (only swift + shared deps)
#  12. Settings isolation (only shared deps)
#  13. Window module boundaries (no scheduler/tray deps)
#  14. Menu isolation (only utils + shared deps)

# ────────────────────────────────────────────────────────────────
# 1. CROSS-PROCESS BOUNDARIES
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "renderer-no-main-import"
description = "Renderer must not import from main process (communication via IPC/preload bridge)"
deny = ["src.renderer -> src.main"]

[[rules]]
name = "main-no-renderer-import"
description = "Main must not import from renderer (communication via webContents.send)"
deny = ["src.main -> src.renderer"]

[[rules]]
name = "preload-no-main-import"
description = "Preload must not import main process logic (only shared types/channels)"
deny = ["src.preload -> src.main"]

[[rules]]
name = "preload-no-renderer-import"
description = "Preload must not import renderer code (preload exposes API; renderer consumes it)"
deny = ["src.preload -> src.renderer"]

[[rules]]
name = "renderer-no-preload-import"
description = "Renderer must not import preload directly (communication via context bridge API)"
deny = ["src.renderer -> src.preload"]

# ────────────────────────────────────────────────────────────────
# 2. SHARED SELF-CONTAINMENT
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "shared-no-process-imports"
description = "Shared must be self-contained — no dependencies on process-specific modules"
deny = [
  "src.shared -> src.main",
  "src.shared -> src.renderer",
  "src.shared -> src.preload",
]

# ────────────────────────────────────────────────────────────────
# 3. SOURCE ↔ TEST ISOLATION
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "no-source-to-test-import"
description = "Source code must not import from tests"
deny = ["src -> tests"]

# ────────────────────────────────────────────────────────────────
# 4. UTILS ISOLATION
# (utils are pure helpers — no business logic, no side effects)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "utils-leaf-modules"
description = "Utility modules are leaves in the dependency graph — no business logic dependencies"
deny = [
  "src.main.utils -> src.main.scheduler",
  "src.main.utils -> src.main.tray",
  "src.main.utils -> src.main.settings",
  "src.main.utils -> src.main.calendar",
  "src.main.utils -> src.main.ipc-handlers",
]

# ────────────────────────────────────────────────────────────────
# 5. IPC HANDLER BOUNDARIES
# (IPC handlers are thin wrappers; window creation is managed elsewhere)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "ipc-handlers-no-scheduler"
description = "Calendar, app, and window IPC handlers must not depend on scheduler"
deny = [
  "src.main.ipc-handlers.calendar -> src.main.scheduler",
  "src.main.ipc-handlers.app -> src.main.scheduler",
  "src.main.ipc-handlers.window -> src.main.scheduler",
]

[[rules]]
name = "ipc-handlers-no-window-modules"
description = "IPC handlers must not import window lifecycle modules"
deny = [
  "src.main.ipc-handlers -> src.main.alert-window",
  "src.main.ipc-handlers -> src.main.settings-window",
]

# ────────────────────────────────────────────────────────────────
# 6. SCHEDULER BOUNDARIES
# (facade pattern: tray/shortcuts/ipc-handlers → scheduler/facade,
#  scheduler never imports tray; poll imports ipc-handlers/shared
#  for typedSend — no cycle because shared.ts is a leaf utility)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "scheduler-no-tray"
description = "Scheduler must never import tray (uses callback decoupling via setTrayTitleCallback)"
deny = ["src.main.scheduler -> src.main.tray"]

[[rules]]
name = "ipc-handlers-use-scheduler-facade"
description = "External consumers must use scheduler/facade.ts, not scheduler/index.ts directly"
deny = ["src.main.ipc-handlers -> src.main.scheduler.index"]

[[rules]]
name = "scheduler-index-no-poll"
description = "scheduler/index.ts must not import from poll.ts (prevents circular dep; use facade as public API)"
deny = ["src.main.scheduler.index -> src.main.scheduler.poll"]

# ────────────────────────────────────────────────────────────────
# 7. SHORTCUTS ISOLATION
# (shortcuts is a leaf action module: registers Cmd+Shift+M, joins next meeting)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "shortcuts-no-tray"
description = "Shortcuts must not import tray (leaf action, no UI coupling)"
deny = ["src.main.shortcuts -> src.main.tray"]

# ────────────────────────────────────────────────────────────────
# 8. RENDERER ENTRY INDEPENDENCE
# (3 separate HTML entries: popover, settings, alert — fully independent)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "renderer-entry-independence"
description = "Renderer entries (popover, settings, alert) are separate BrowserWindows — no cross-imports"
deny = [
  "src.renderer.settings -> src.renderer.alert",
  "src.renderer.alert -> src.renderer.settings",
]

# ────────────────────────────────────────────────────────────────
# 9. SWIFT BRIDGE ISOLATION
# (Swift bridge modules only depend on shared types and each other)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "swift-isolation"
description = "Swift bridge modules only depend on shared types and each other — no application logic deps"
deny = [
  "src.main.swift -> src.main.scheduler",
  "src.main.swift -> src.main.tray",
  "src.main.swift -> src.main.settings",
  "src.main.swift -> src.main.calendar",
  "src.main.swift -> src.main.ipc-handlers",
]

# ────────────────────────────────────────────────────────────────
# 10. LEAF MODULE ISOLATION
# (auto-launch, auto-updater, notification, power have no internal app deps)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "leaf-modules-no-business-logic"
description = "Leaf modules (auto-launch, auto-updater, notification, power) have no internal application deps"
deny = [
  "src.main.auto-launch -> src.main.scheduler",
  "src.main.auto-launch -> src.main.tray",
  "src.main.auto-launch -> src.main.settings",
  "src.main.auto-updater -> src.main.scheduler",
  "src.main.auto-updater -> src.main.tray",
  "src.main.auto-updater -> src.main.settings",
  "src.main.notification -> src.main.scheduler",
  "src.main.notification -> src.main.tray",
  "src.main.notification -> src.main.settings",
  "src.main.power -> src.main.scheduler",
  "src.main.power -> src.main.tray",
  "src.main.power -> src.main.settings",
]

# ────────────────────────────────────────────────────────────────
# 11. CALENDAR ISOLATION
# (calendar only depends on swift bridge and shared types)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "calendar-isolation"
description = "Calendar module only depends on swift bridge and shared types — no business logic deps"
deny = [
  "src.main.calendar -> src.main.scheduler",
  "src.main.calendar -> src.main.tray",
  "src.main.calendar -> src.main.ipc-handlers",
]

# ────────────────────────────────────────────────────────────────
# 12. SETTINGS ISOLATION
# (settings only depends on shared types)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "settings-isolation"
description = "Settings only depends on shared types — no business logic deps"
deny = [
  "src.main.settings -> src.main.scheduler",
  "src.main.settings -> src.main.tray",
]

# ────────────────────────────────────────────────────────────────
# 13. WINDOW MODULE BOUNDARIES
# (window lifecycle managed by lifecycle.ts / tray / scheduler)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "window-modules-boundaries"
description = "Window modules must not import from scheduler or tray (lifecycle managed externally)"
deny = [
  "src.main.settings-window -> src.main.scheduler",
  "src.main.settings-window -> src.main.tray",
  "src.main.alert-window -> src.main.scheduler",
  "src.main.alert-window -> src.main.tray",
]

# ────────────────────────────────────────────────────────────────
# 14. MENU ISOLATION
# (menu modules only depend on utils and shared types)
# ────────────────────────────────────────────────────────────────

[[rules]]
name = "menu-isolation"
description = "Menu modules only depend on utils and shared types — no business logic deps"
deny = [
  "src.main.menu -> src.main.scheduler",
  "src.main.menu -> src.main.tray",
  "src.main.menu -> src.main.settings",
  "src.main.menu -> src.main.calendar",
  "src.main.menu -> src.main.ipc-handlers",
]

# ════════════════════════════════════════════════════════════════
# 15. TEST COVERAGE REQUIREMENTS
# (critical modules must have corresponding test files)
# ════════════════════════════════════════════════════════════════

[[rules]]
description = "Scheduler modules must have tests"
layer = "test"
pattern = "src/main/scheduler/*.ts"
requires_test = true

[[rules]]
description = "IPC handlers must have tests"
layer = "test"
pattern = "src/main/ipc-handlers/*.ts"
requires_test = true

[[rules]]
description = "Swift bridge must have tests"
layer = "test"
pattern = "src/main/swift/*.ts"
requires_test = true
